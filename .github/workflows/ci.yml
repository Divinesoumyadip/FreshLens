name: FreshLens CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend - Install & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Check structure
        working-directory: backend
        run: |
          node -e "require('./src/config/constants.js'); console.log('Constants OK')"
          echo "Backend structure verified"

  ml:
    name: ML - Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Syntax check
        run: python -m py_compile ml_models/train_models.py && echo "ML script OK"
